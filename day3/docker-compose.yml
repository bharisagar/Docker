version: "3.8"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - redis

  redis:
    image: redis:7

    container_name: redis-server

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  redis-data: